services:
  - type: web
    name: starry-clouds
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: starry-clouds-db
          property: connectionString

databases:
  - name: starry-clouds-db
    plan: free
